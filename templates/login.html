{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="card form-card">
    <h2>Login</h2>
    <form method="POST">
        {{ form.hidden_tag() }}

        <label for="email">{{ form.email.label.text }}</label>
        {{ form.email(id="email", placeholder="Enter your email") }}

        <label for="password">{{ form.password.label.text }}</label>
        {{ form.password(id="password", placeholder="Enter your password") }}

        {{ form.submit(class_="btn") }}
    </form>
</section>
{% endblock %}
